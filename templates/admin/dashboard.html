{% extends "admin/admin_base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1 class="card-title">👋 Добро пожаловать!</h1>
    </div>
    <div style="color: #6b7280; margin-bottom: 32px;">
        Управление сайтом
    </div>
    
    <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px;">
        <button onclick="loadContent('hit-products')" class="btn btn-secondary" id="btn-hit-products">
            Карточки товаров
        </button>
        <button onclick="loadContent('requests')" class="btn btn-secondary" id="btn-requests">
            Заявки
        </button>
        <button onclick="loadContent('settings')" class="btn btn-secondary" id="btn-settings">
            Настройки
        </button>
    </div>
</div>

<!-- Контейнер для динамической загрузки контента -->
<div id="dynamic-content"></div>

<!-- Тост-уведомление для AJAX -->
<div id="ajaxToast" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; min-width: 300px; max-width: 90%; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center;">
    <div style="padding: 15px 25px;">
        <span style="font-size: 16px;">✅ Данные успешно сохранены</span>
    </div>
</div>

<!-- Модальное окно для форм -->
<div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div id="modalContent" style="background: white; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
        <!-- Сюда будет загружаться форма -->
    </div>
</div>

<!-- Модальное окно для подтверждения удаления -->
<div id="deleteConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; width: 90%; max-width: 380px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
        <div style="padding: 24px;">
            <div style="text-align: center; margin-bottom: 24px;">
                <h3 style="font-size: 20px; font-weight: 500; color: #111827;">Удалить товар?</h3>
            </div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="confirmDeleteBtn" style="background: rgba(19, 77, 113, 0.5); border: none; border-radius: 6px; padding: 8px 24px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(19, 77, 113, 0.7)'" onmouseout="this.style.background='rgba(19, 77, 113, 0.5)'">
                    Да, удалить
                </button>
                <button onclick="closeDeleteModal()" style="background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 24px; color: #374151; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#e5e7eb'" onmouseout="this.style.background='#f3f4f6'">
                    Отмена
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для подтверждения удаления заявки -->
<div id="deleteRequestConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; width: 90%; max-width: 380px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
        <div style="padding: 24px;">
            <div style="text-align: center; margin-bottom: 24px;">
                <h3 style="font-size: 20px; font-weight: 500; color: #111827;">Удалить заявку?</h3>
            </div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="confirmDeleteRequestBtn" style="background: rgba(19, 77, 113, 0.5); border: none; border-radius: 6px; padding: 8px 24px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(19, 77, 113, 0.7)'" onmouseout="this.style.background='rgba(19, 77, 113, 0.5)'">
                    Да, удалить
                </button>
                <button onclick="closeDeleteRequestModal()" style="background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 24px; color: #374151; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#e5e7eb'" onmouseout="this.style.background='#f3f4f6'">
                    Отмена
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для подтверждения удаления ВСЕХ заявок -->
<div id="deleteAllRequestsConfirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; width: 90%; max-width: 380px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
        <div style="padding: 24px;">
            <div style="text-align: center; margin-bottom: 24px;">
                <h3 style="font-size: 20px; font-weight: 500; color: #111827;">Удалить все заявки?</h3>
            </div>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="confirmDeleteAllRequestsBtn" style="background: rgba(19, 77, 113, 0.5); border: none; border-radius: 6px; padding: 8px 24px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(19, 77, 113, 0.7)'" onmouseout="this.style.background='rgba(19, 77, 113, 0.5)'">
                    Да, удалить все
                </button>
                <button onclick="closeDeleteAllRequestsModal()" style="background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 24px; color: #374151; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#e5e7eb'" onmouseout="this.style.background='#f3f4f6'">
                    Отмена
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function loadContent(section) {
        document.querySelectorAll('.btn-secondary').forEach(btn => {
            btn.classList.remove('btn-active');
            if (btn.id === `btn-${section}`) {
                btn.classList.add('btn-active');
            }
        });
        
        const container = document.getElementById('dynamic-content');
        container.innerHTML = '<div style="text-align: center; padding: 40px;">⏳ Загрузка...</div>';
        
        fetch(`/admin/ajax/${section}`)
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
            })
            .catch(error => {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: red;">❌ Ошибка загрузки</div>';
                console.error('Ошибка:', error);
            });
    }
    
      function loadForm(url, title) {
          const modalContent = document.getElementById('modalContent');
          const modalOverlay = document.getElementById('modalOverlay');
        
          modalContent.innerHTML = '<div style="text-align: center; padding: 40px;">⏳ Загрузка...</div>';
          modalOverlay.style.display = 'flex';
        
          fetch(url)
              .then(response => response.text())
              .then(html => {
                  modalContent.innerHTML = `
                      <div style="padding: 24px;">
                          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                              <h2 style="font-size: 20px; font-weight: 600; text-align: center; flex: 1;">${title}</h2>
                              <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
                          </div>
                          <div id="modalFormContainer">${html}</div>
                      </div>
                `  ;
                
                   const form = document.querySelector('#modalFormContainer form');
                   if (form) {
                       form.onsubmit = function(e) {
                           e.preventDefault();
                           submitModalForm(form);
                       };
                   }
                })
                .catch(error => {
                    modalContent.innerHTML = '<div style="padding: 40px; text-align: center; color: red;">❌ Ошибка загрузки</div>';
                    console.error('Ошибка:', error);
                });
    }
    
    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('modalContent').innerHTML = '';
    }
    
    function submitModalForm(form) {
        const formData = new FormData(form);
        
        fetch(form.action, {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(() => {
            closeModal();
            loadContent('hit-products');
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert('Произошла ошибка при сохранении');
        });
    }
    
    function deleteItem(url, name) {
        if (confirm(`Удалить ${name}?`)) {
            fetch(url)
                .then(() => {
                    loadContent('hit-products');
                });
        }
    }
    
    function deleteAllRequests() {
        if (confirm('Удалить ВСЕ заявки? Это действие нельзя отменить!')) {
            fetch('/admin/requests/delete-all?confirm=yes')
                .then(() => {
                    loadContent('requests');
                });
        }
    }
    
    // Закрытие модального окна при клике на фон
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });
    
    // Закрытие по ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('modalOverlay');
            if (modal.style.display === 'flex') {
                closeModal();
            }
        }
    });

    // Функция для предпросмотра изображения в модальном окне
    window.handleFileSelect = function(input) {
        var file = input.files[0];
        var previewDiv = document.getElementById('previewNew');
        var previewImg = document.getElementById('newImage');
        var currentDiv = document.getElementById('currentImage');
        
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                if (previewImg) {
                    previewImg.src = e.target.result;
                }
                if (previewDiv) {
                    previewDiv.style.display = 'block';
                }
                if (currentDiv) {
                    currentDiv.style.display = 'none';
                }
            };
            reader.readAsDataURL(file);
        }
    };

    // Переменные для модального окна удаления
    var pendingDeleteUrl = null;
    var pendingDeleteName = null;
    
    function confirmDelete(url, name) {
        pendingDeleteUrl = url;
        pendingDeleteName = name;
        document.getElementById('deleteConfirmModal').style.display = 'flex';
    }
    
    function closeDeleteModal() {
        document.getElementById('deleteConfirmModal').style.display = 'none';
        pendingDeleteUrl = null;
        pendingDeleteName = null;
    }
    
    function executeDelete() {
        if (pendingDeleteUrl) {
            fetch(pendingDeleteUrl)
                .then(() => {
                    closeDeleteModal();
                    loadContent('hit-products');
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    closeDeleteModal();
                    alert('Произошла ошибка при удалении');
                });
        }
    }
    
    // Назначаем обработчик на кнопку "Да, удалить"
    document.getElementById('confirmDeleteBtn').onclick = executeDelete;

    // Переменные для модального окна удаления заявки
    var pendingDeleteRequestUrl = null;
    var pendingDeleteRequestName = null;
    
    function confirmDeleteRequest(url, name) {
        pendingDeleteRequestUrl = url;
        pendingDeleteRequestName = name;
        document.getElementById('deleteRequestConfirmModal').style.display = 'flex';
    }
    
    function closeDeleteRequestModal() {
        document.getElementById('deleteRequestConfirmModal').style.display = 'none';
        pendingDeleteRequestUrl = null;
        pendingDeleteRequestName = null;
    }
    
    function executeDeleteRequest() {
        if (pendingDeleteRequestUrl) {
            fetch(pendingDeleteRequestUrl)
                .then(() => {
                    closeDeleteRequestModal();
                    loadContent('requests');
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    closeDeleteRequestModal();
                    alert('Произошла ошибка при удалении');
                });
        }
    }

    // Назначаем обработчик на кнопку "Да, удалить" для заявок
    document.getElementById('confirmDeleteRequestBtn').onclick = executeDeleteRequest;

    // Переменные для модального окна удаления всех заявок
    function confirmDeleteAllRequests() {
        document.getElementById('deleteAllRequestsConfirmModal').style.display = 'flex';
    }
    
    function closeDeleteAllRequestsModal() {
        document.getElementById('deleteAllRequestsConfirmModal').style.display = 'none';
    }
    
    function executeDeleteAllRequests() {
        fetch('/admin/requests/delete-all?confirm=yes')
            .then(() => {
                closeDeleteAllRequestsModal();
                loadContent('requests');
            })
            .catch(error => {
                console.error('Ошибка:', error);
                closeDeleteAllRequestsModal();
                alert('Произошла ошибка при удалении');
            });
    }

    // Назначаем обработчик на кнопку "Да, удалить все"
    document.getElementById('confirmDeleteAllRequestsBtn').onclick = executeDeleteAllRequests;

    // ===== ГЛОБАЛЬНЫЕ ФУНКЦИИ ДЛЯ ПРЕДПРОСМОТРА В НАСТРОЙКАХ =====
    window.previewLogo = function(event) {
        var file = event.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var previewBlock = document.getElementById('previewBlock');
                var previewImg = document.getElementById('logoPreview');
                var currentBlock = document.getElementById('currentLogoBlock');
                var noLogoText = document.getElementById('noLogoText');
                
                if (previewImg) previewImg.src = e.target.result;
                if (previewBlock) previewBlock.style.display = 'block';
                if (currentBlock) currentBlock.style.display = 'none';
                if (noLogoText) noLogoText.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };
    
    window.cancelPreview = function() {
        var fileInput = document.getElementById('logoInput');
        if (fileInput) fileInput.value = '';
        var previewBlock = document.getElementById('previewBlock');
        if (previewBlock) previewBlock.style.display = 'none';
        var currentBlock = document.getElementById('currentLogoBlock');
        var noLogoText = document.getElementById('noLogoText');
        if (currentBlock) currentBlock.style.display = 'block';
        else if (noLogoText) noLogoText.style.display = 'block';
    };
    
    window.previewPhoneIcon = function(event) {
        var file = event.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var previewBlock = document.getElementById('phonePreviewBlock');
                var previewImg = document.getElementById('phoneIconPreview');
                var currentBlock = document.getElementById('currentPhoneIconBlock');
                var noIconText = document.getElementById('noPhoneIconText');
                
                if (previewImg) previewImg.src = e.target.result;
                if (previewBlock) previewBlock.style.display = 'block';
                if (currentBlock) currentBlock.style.display = 'none';
                if (noIconText) noIconText.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };
    
    window.cancelPhonePreview = function() {
        var fileInput = document.getElementById('phoneIconInput');
        if (fileInput) fileInput.value = '';
        var previewBlock = document.getElementById('phonePreviewBlock');
        if (previewBlock) previewBlock.style.display = 'none';
        var currentBlock = document.getElementById('currentPhoneIconBlock');
        var noIconText = document.getElementById('noPhoneIconText');
        if (currentBlock) currentBlock.style.display = 'block';
        else if (noIconText) noIconText.style.display = 'block';
    };

    // AJAX отправка формы настроек (глобальный обработчик)
    $(document).on('submit', '#settingsForm', function(e) {
        e.preventDefault();
        
        // ===== КОПИРУЕМ ЗНАЧЕНИЯ ИЗ ВИДИМЫХ ПОЛЕЙ В СКРЫТЫЕ =====
        var hiddenFields = ['shop_title', 'shop_subtitle', 'shop_address', 'work_hours', 'hit_block_title', 'form_title'];
        
        for (var i = 0; i < hiddenFields.length; i++) {
            var fieldName = hiddenFields[i];
            var hiddenInput = document.getElementById(fieldName + '_hidden');
            if (!hiddenInput) continue;
            
            var desktopInput = document.querySelector('input[name="' + fieldName + '_desktop"]');
            var mobileTextarea = document.querySelector('textarea[name="' + fieldName + '_mobile"]');
            
            // Проверяем, какое поле видимо на экране (offsetParent !== null значит видимо)
            if (desktopInput && desktopInput.offsetParent !== null) {
                hiddenInput.value = desktopInput.value;
            } else if (mobileTextarea && mobileTextarea.offsetParent !== null) {
                hiddenInput.value = mobileTextarea.value;
            }
        }
        // ===== КОНЕЦ КОПИРОВАНИЯ =====

        var form = this;
        var formData = new FormData(form);
        
        fetch('/admin/ajax/settings', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                var toast = document.getElementById('ajaxToast');
                if (toast) {
                    toast.style.display = 'block';
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(function() {
                        toast.style.opacity = '1';
                    }, 10);
                    
                    setTimeout(function() {
                        toast.style.opacity = '0';
                        setTimeout(function() {
                            toast.style.display = 'none';
                        }, 300);
                    }, 3000);
                }
                
                loadContent('settings');
            } else {
                alert('Ошибка при сохранении');
            }
        })
        .catch(function(error) {
            console.error('Ошибка:', error);
            alert('Произошла ошибка при сохранении');
        });
    });

    // Функция для раскрытия/скрытия карточки заявки (мобильная версия)
    window.toggleRequest = function(headerElement) {
        var card = headerElement.closest('.mobile-request-card');
        var details = card.querySelector('.request-details');
        var icon = headerElement.querySelector('.toggle-icon');
        
        if (details.style.display === 'none') {
            details.style.display = 'block';
            icon.textContent = '▲';
        } else {
            details.style.display = 'none';
            icon.textContent = '▼';
        }
    };
</script>

<style>
    .btn-active {
        background: rgba(19, 77, 113, 0.5);
        color: white;
        border: none;
    }
    .btn-active:hover {
        background: rgba(19, 77, 113, 0.6);
        color: white;
    }

/* Мобильная версия: кнопки друг под другом, одинаковой ширины, текст по центру */
@media (max-width: 600px) {
    .card .btn-secondary {
        width: 100% !important;
        text-align: center !important;
        justify-content: center !important;
        margin-bottom: 8px;
    }
    
    .card .btn-secondary:last-child {
        margin-bottom: 0;
    }
}
</style>
{% endblock %}
